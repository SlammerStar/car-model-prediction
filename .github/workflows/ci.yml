# ============================================================================
# GitHub Actions CI/CD Pipeline
# Intelligent Used Car Price Prediction System
# ============================================================================
# Triggers on push/PR to main branch
# Runs tests, code quality checks, and verifies the build

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ------------------------------------------------------------------
  # Code Quality Check
  # ------------------------------------------------------------------
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check formatting with Black
        run: black --check --diff .

      - name: Lint with Flake8
        run: |
          flake8 src/ api/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --count \
            --show-source \
            --statistics

  # ------------------------------------------------------------------
  # Unit Tests
  # ------------------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Build Verification
  # ------------------------------------------------------------------
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from src.utils import format_price_inr; print('✅ Utils OK')"
          python -c "from src.data_preprocessing import prepare_data; print('✅ Data Preprocessing OK')"
          python -c "from src.feature_engineering import prepare_features; print('✅ Feature Engineering OK')"
          python -c "from src.predict import predict_price; print('✅ Predict OK')"
          python -c "from api.main import app; print('✅ FastAPI OK')"

      - name: Verify Docker build
        run: |
          docker build -t car-price-predictor:test .
          echo "✅ Docker build successful"
